coverage:
  precision: 2
  round: down
  range: "95...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
        informational: true
    patch:
      default:
        target: 100%
        threshold: 0%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/"
  - "dist/"
  - "coverage/"
  - "scripts/"
  - "**/*.config.ts"
  - "**/*.config.mjs"
  - "**/*.config.js"

flags:
  unittests:
    paths:
      - "src/"
    carryforward: false
